# =========================
# KITTY CYBER RESTORE
# =========================

font_family      JetBrainsMono Nerd Font
font_size        12.5

# TRANSPARENCIA (CLAVE)
background_opacity 0.80

# UI
window_padding_width 10
draw_minimal_borders yes

# UX
enable_audio_bell no
confirm_os_window_close 0

cursor_shape block

# COLORS (dark cyber theme)
foreground #cdd6f4
background #0b0b12

color0  #1e1e2e
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de

# SELECTION
selection_foreground #0b0b12
selection_background #89b4fa
