# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua



$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun


# brillo
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# volumen
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t

bind = $mainMod, I, exec, ~/.local/bin/installer
bind = $mainMod, P, exec, wlogout -p layer-shell
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, R, exec, rofi -show drun
bind = $mainMod, B, exec, vivaldi
bind = $mainMod, E, exec, thunar
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, L, exec, hyprlock


bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5



input {
	kb_layout = latam
}

exec-once = waybar
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = mpvpaper -o "no-audio loop" "*" ~/wallpapers/hombrepolvo.mp4


decoration {
    rounding = 18

    blur {
        enabled = true
        size = 10
        passes = 3
        new_optimizations = true
    }

    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 20
        render_power = 3
    }
}

general {
    gaps_in = 6
    gaps_out = 12

    border_size = 2

    col.active_border = rgba(89b4faff)
    col.inactive_border = rgba(313244aa)

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}
